<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>SKILL-NEXUS（スキル・ネクサス）| スキル三目並べ 公式サイト</title>
		<meta name="description" content="無料ブラウザゲーム『SKILL-NEXUS』公式サイト。5x5の盤面で繰り広げられる、サイバーパンク風の超頭脳派ローカル＆オンライン対戦ゲーム！多彩なスキルを駆使して戦局を支配せよ。インストール不要で今すぐプレイ！" />

		<!-- PWA: Manifest & Theme -->
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#000000" />
		<meta name="mobile-web-app-capable" content="yes" />

		<!-- Apple PWA support -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="SKILL-NEXUS" />
		<link rel="apple-touch-icon" href="/icons/icon.svg" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- PWA: Register Service Worker -->
		<script>
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker.register('/service-worker.js').catch((err) => {
						console.warn('SW registration failed:', err);
					});
				});
			}
		</script>
	</body>
</html>
